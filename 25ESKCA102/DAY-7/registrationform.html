<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="formStylesheet.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        h1 {
            color: aqua;


        }
    </style>

</head>

<body id="body">
    <div class="container py-4">
        <form class="background" id="frmRegister" action="registration.php" method="post">
            <h1 class="h1">Registration Form</h1>
            <p>Submit this form for online registration</p>

            <div class="mb-3">
                <label for="txtName"><h3>Name:</h3></label>
                <input type="text" id="txtName" name="txtName" required placeholder="Enter your Name">

                <label for="txtEmail"><h3>Email:</h3></label>
                <input type="email" id="txtEmail" name="txtEmail" required placeholder="Enter your Email">

                <label for="txtPhone"><h3>Phone No.:</h3></label>
                <input type="text" id="txtPhone" name="txtPhone" required placeholder="Enter your Phone">

                <label for="dtDOB"><h3>DOB</h3></label>
                <input type="date" id="dtDOB" name="dtDOB" required>
            </div>

            <div class="gender-group mt-3">
                <h3>Select gender:</h3>
                <div class="gender-options">
                    <label><input type="radio" name="gender" value="Male" required /> Male</label>
                    <label><input type="radio" name="gender" value="Female" /> Female</label>
                    <label><input type="radio" name="gender" value="Transgender" /> Transgender</label>
                    <label><input type="radio" name="gender" value="Prefer not to say" /> Prefer not to say</label>
                </div>
            </div>
            <br></br>

            <label for="branch"><h3>Branch:</h3></label>
            <select id="branch" name="branch" required>
                <option value="" selected disabled>Select your branch</option>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
                <option value="MECH">MECH</option>
                <option value="CIVIL">CIVIL</option>
            </select>
            <br></br>

            <label for="txtAddress"><h3>Address</h3></label>
            <textarea id="txtAddress" name="txtAddress" rows="4" cols="50" placeholder="Enter your address" required></textarea>

            <label for="myfile"><h3>Upload File</h3></label>
            <input type="file" name="myfile" id="myfile" accept=".jpg,.jpeg,.png,.gif">
            <br></br>

            <label for="pwdPassword"><h3>Password</h3></label>
            <input type="password" id="pwdPassword" name="pwdPassword" placeholder="Enter your password" required>
            <br></br>

            <label for="pwdconfirmpassword"><h3>Confirm Password</h3></label>
            <input type="password" id="pwdconfirmpassword" name="pwdconfirmpassword" placeholder="Enter your password" required>
            <br></br>

            <button type="submit" id="submit" class="btn btn-primary mt-3">Submit</button>
        </form>

    </div>
</body>

</html>
