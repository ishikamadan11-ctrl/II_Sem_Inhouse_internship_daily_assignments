<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Registraqtion</title>
    <link rel="stylesheet" href="formStylesheet.css">
    <style>
       
        h1 {
            color: aqua;


        }
    </style>

</head>

<body id="body">
    <div>
        <form class="background" id="frmRegister" id="rounded">
            <h1 class="h1">Registration Form</h1>
            <p>Submit this form for online registration</p>
            <label>
                <h3>Name:</h3>
               <input type="text" id="txtName" required placeholder="Enter your Name">

            </label><br></br>
            <label>
                <h3>Email:</h3>
               <input type="email" id="txtEmail" required placeholder="Enter your Email">
            </label><br></br>
            <label>
                <h3>Phone No.:</h3>
                <input type="text" id="txtPhone" required placeholder="Enter your Phone">
            </label><br></br>
            <label> <h3>Select gender:</h3></label><br></br>
            <input type="radio" id="check-male" name="gender" value="male" />
            <label for="check-male">male</label>

            <input type="radio" id="check-female" name="gender" value="female" /> <!----or chkFemale-->
            <label for="check-female">female</label>

            <input type="radio" id="check-transgender" name="Transgender" value="Transgender" />
            <label for="check-transgender">Transgender</label>

            <input type="radio" id="check-other" name="Prefer not to say" value="Prefer not to say" />
            <label for="check-other">Prefer not to say</label><br></br>

            <label for="dtDOB"> <h3>DOB</h3></label><br></br>
            <input type="date" id="dtDOB" name="dtDOB" /><br></br>


            <label for="pwdPassword"> <h3>Password</h3></label><br></br>
            <input type="password" id="pwdPassword" name="pwdPassword" placeholder="Enter your password"><br></br>


            <label for="pwdconfirmpassword"> <h3>Confirm Password</h3></label><br></br>
            <input type="password" id="pwdconfirmpassword" name="pwdconfirmpassword" placeholder="Enter your password">

            <input type="submit" id="submit">
        </form>

    </div>
</body>

</html>
